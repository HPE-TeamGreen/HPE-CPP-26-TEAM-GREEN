<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #eef2ff; stroke: #667eea; stroke-width: 2; rx: 12; ry: 12; }
      .border { fill: none; stroke: #cbd5e0; stroke-width: 2; }
      .text-title { font: 700 20px Inter, sans-serif; fill: #2d3748; }
      .text { font: 400 14px Inter, sans-serif; fill: #2d3748; }
      .small { font: 400 12px Inter, sans-serif; fill: #4a5568; }
      .arrow { fill: none; stroke: #667eea; stroke-width: 3; marker-end: url(#arrowhead); }
      .section { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 14; ry: 14; }
      .section-title { font: 600 16px Inter, sans-serif; fill: #2d3748; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea" />
    </marker>
  </defs>

  <rect class="bg" width="960" height="560" />
  <rect x="20" y="20" width="920" height="520" class="section" />
  <text x="40" y="50" class="section-title">TempSafe Platform Architecture</text>

  <g>
    <rect class="box" x="60" y="90" width="220" height="120" />
    <text x="170" y="120" text-anchor="middle" class="text-title">Data Sources</text>
    <text x="170" y="145" text-anchor="middle" class="text">IoT Sensors</text>
    <text x="170" y="165" text-anchor="middle" class="text">Simulation / Demo Data</text>
    <text x="170" y="185" text-anchor="middle" class="text">Analyst Uploads</text>
  </g>

  <g>
    <rect class="box" x="320" y="90" width="240" height="120" />
    <text x="440" y="120" text-anchor="middle" class="text-title">Telemetry Service</text>
    <text x="440" y="145" text-anchor="middle" class="text">Validate · Normalize · Publish</text>
    <text x="440" y="165" text-anchor="middle" class="text">Kafka Producer</text>
  </g>

  <g>
    <rect class="box" x="320" y="240" width="240" height="90" />
    <text x="440" y="274" text-anchor="middle" class="text-title">Kafka</text>
    <text x="440" y="296" text-anchor="middle" class="text">Telemetry topics</text>
  </g>

  <g>
    <rect class="box" x="620" y="90" width="260" height="120" />
    <text x="750" y="120" text-anchor="middle" class="text-title">Reporting Service</text>
    <text x="750" y="145" text-anchor="middle" class="text">Analytics API</text>
    <text x="750" y="165" text-anchor="middle" class="text">Alerts & history</text>
  </g>

  <g>
    <rect class="box" x="620" y="260" width="260" height="120" />
    <text x="750" y="290" text-anchor="middle" class="text-title">React Dashboard</text>
    <text x="750" y="315" text-anchor="middle" class="text">Live status · Alerts · Reports</text>
  </g>

  <g>
    <rect class="box" x="320" y="380" width="240" height="120" />
    <text x="440" y="410" text-anchor="middle" class="text-title">PostgreSQL</text>
    <text x="440" y="435" text-anchor="middle" class="text">Telemetry · Alerts · Shipments</text>
  </g>

  <path class="arrow" d="M280 140 L320 140" />
  <path class="arrow" d="M280 180 L320 180" />
  <path class="arrow" d="M440 210 L440 240" />
  <path class="arrow" d="M440 330 L440 380" />
  <path class="arrow" d="M560 290 L620 290" />
  <path class="arrow" d="M580 420 L620 420" />
  <path class="arrow" d="M700 330 L700 380" />
  <path class="arrow" d="M700 220 L700 240" />
  <path class="arrow" d="M660 330 L620 330" />

  <path class="arrow" d="M440 420 L440 460" />
  <path class="arrow" d="M740 420 L740 460" />
  <line x1="480" y1="450" x2="680" y2="450" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)" />

  <text x="340" y="530" class="small">TempSafe ingests sensor data, publishes to Kafka, stores events in PostgreSQL, and surfaces analytics in the dashboard.</text>
</svg>