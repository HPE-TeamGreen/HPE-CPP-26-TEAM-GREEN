server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------
    # Reverse-proxy: route /api/* to the correct backend services
    # The frontend JS will call /api/shipments, /api/telemetry, etc.
    # Nginx strips /api/shipments and forwards to the shipment service
    # ---------------------------------------------------------------

    # Shipment service (port 8000)
    location /api/shipments {
        proxy_pass http://shipment.apps.svc.cluster.local:8000/shipments;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/sensors {
        proxy_pass http://shipment.apps.svc.cluster.local:8000/sensors;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telemetry service (port 8001)
    location /api/telemetry {
        proxy_pass http://telemetry.apps.svc.cluster.local:8001/telemetry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/alerts {
        proxy_pass http://telemetry.apps.svc.cluster.local:8001/alerts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/excursions {
        proxy_pass http://telemetry.apps.svc.cluster.local:8001/excursions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reporting service (port 8002)
    location /api/reports {
        proxy_pass http://reporting.apps.svc.cluster.local:8002/reports;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---------------------------------------------------------------
    # SPA fallback: serve index.html for all frontend routes
    # This ensures React Router handles /shipments, /alerts, etc.
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
