apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: apps
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: tempsafe-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
