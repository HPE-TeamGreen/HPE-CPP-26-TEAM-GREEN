name: Convert SVG to PNG

on:
  push:
    paths:
      - 'assets/architecture.svg'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Convert SVG to PNG
        run: |
          mkdir -p assets
          rsvg-convert -w 1200 assets/architecture.svg -o assets/architecture.png

      - name: Commit and push PNG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/architecture.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate architecture PNG from SVG"
            git push
          fi
